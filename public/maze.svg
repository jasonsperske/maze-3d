<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#111"/>
  <!-- Maze walls: a simple top-down maze pattern -->
  <!-- Outer border -->
  <rect x="1" y="1" width="30" height="2" fill="#4af"/>
  <rect x="1" y="29" width="30" height="2" fill="#4af"/>
  <rect x="1" y="1" width="2" height="30" fill="#4af"/>
  <rect x="29" y="1" width="2" height="14" fill="#4af"/>
  <rect x="29" y="17" width="2" height="14" fill="#4af"/>
  <!-- Inner walls -->
  <rect x="5" y="3" width="2" height="10" fill="#4af"/>
  <rect x="5" y="15" width="2" height="8" fill="#4af"/>
  <rect x="9" y="9" width="10" height="2" fill="#4af"/>
  <rect x="9" y="3" width="2" height="4" fill="#4af"/>
  <rect x="13" y="3" width="2" height="8" fill="#4af"/>
  <rect x="15" y="15" width="14" height="2" fill="#4af"/>
  <rect x="17" y="3" width="10" height="2" fill="#4af"/>
  <rect x="25" y="5" width="2" height="6" fill="#4af"/>
  <rect x="21" y="5" width="2" height="4" fill="#4af"/>
  <rect x="5" y="25" width="16" height="2" fill="#4af"/>
  <rect x="9" y="19" width="2" height="8" fill="#4af"/>
  <rect x="13" y="19" width="8" height="2" fill="#4af"/>
  <rect x="19" y="19" width="2" height="10" fill="#4af"/>
  <rect x="23" y="19" width="2" height="6" fill="#4af"/>
  <rect x="23" y="27" width="6" height="2" fill="#4af"/>
  <rect x="13" y="13" width="2" height="4" fill="#4af"/>
  <!-- Player dot -->
  <rect x="2" y="21" width="3" height="3" fill="#fa4"/>
</svg>
